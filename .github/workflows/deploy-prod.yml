name: Pharma-Frontend CI/CD

on:
  push:
    branches: [ prod ]
  pull_request:
    branches: [ prod ]


env:
  REPO_NAME: ${{ github.repository }}
  CONTAINER_NAME: pharma-frontend
  REGISTRY: ghcr.io
  SSH_HOST: ${{ secrets.SSH_HOST_DEV }}
  SSH_USER: ${{ secrets.SSH_USER_DEV }}
  SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  SSH_PASS: ${{ secrets.SSH_PASS_DEV }}
  PORT: 3000:3000


jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: docker/
          push: true
          tags: "${{ env.REGISTRY }}/${{ env.REPO_NAME }}:${{ github.sha }}"
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_NAME }}:buildcache,mode=max


  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest
    permissions:
        contents: read
        packages: write
    steps:
      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@master
        with:
            host: "${{ env.SSH_HOST }}"
            username: "${{ env.SSH_USER }}"
            key: "${{ env.SSH_KEY }}"
            script: |
                echo ${{ secrets.GITHUB_TOKEN }} | docker login -u ${{ github.actor }} --password-stdin ${{ env.REGISTRY }}
                docker pull "${{ env.REGISTRY }}/${{ env.REPO_NAME }}:${{ github.sha }}"
                docker stop "${{ env.CONTAINER_NAME }}" || true
                docker rm "${{ env.CONTAINER_NAME }}" || true
                docker run -d --name "${{ env.CONTAINER_NAME }}" -p "${{ env.PORT }}"  "${{ env.REGISTRY }}/${{ env.REPO_NAME }}:${{ github.sha }}"
                docker compose -f compose.prod.yml up -d --build