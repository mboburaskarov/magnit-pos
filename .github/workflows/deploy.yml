name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Build & Push Docker Image
  # ─────────────────────────────────────────
  build:
    name: 🏗️ Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=prod-${{ github.sha }}
            type=raw,value=prod-latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.PROD_VITE_API_BASE_URL }}
            VITE_MEDIA_BASE_URL=${{ secrets.PROD_VITE_MEDIA_BASE_URL }}
            VITE_USE_MOCKS=false

  # ─────────────────────────────────────────
  # Stage 2: Deploy to Server via SSH
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%b' "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.PROD_SERVER_PORT || '22' }} -H "${{ secrets.PROD_SERVER_HOST }}" >> ~/.ssh/known_hosts
        env:
          SSH_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Copy compose file to server
        run: |
          scp -i ~/.ssh/deploy_key \
            -P ${{ secrets.PROD_SERVER_PORT || '22' }} \
            compose.prod.yml \
            ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}:${{ secrets.PROD_DEPLOY_PATH }}/

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.PROD_SERVER_PORT || '22' }} \
            ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} \
            "
              cd ${{ secrets.PROD_DEPLOY_PATH }}
              echo $GHCR_TOKEN | docker login ghcr.io -u $GHCR_USER --password-stdin
              export DOCKER_IMAGE=$DOCKER_IMAGE
              docker compose -f compose.prod.yml pull
              docker compose -f compose.prod.yml up -d --force-recreate
              docker image prune -f
              echo 'Deployed $DOCKER_IMAGE successfully'
            "
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-latest
