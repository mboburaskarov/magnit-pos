name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Build & Push Docker Image
  # ─────────────────────────────────────────
  build:
    name: 🏗️ Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=prod-${{ github.sha }}
            type=raw,value=prod-latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.PROD_VITE_API_BASE_URL }}
            VITE_MEDIA_BASE_URL=${{ secrets.PROD_VITE_MEDIA_BASE_URL }}
            VITE_USE_MOCKS=false

  # ─────────────────────────────────────────
  # Stage 2: Deploy to Server via SSH
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify secrets are set
        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "ERROR: PROD_SSH_PRIVATE_KEY is empty"
            exit 1
          else
            echo "Key length: ${#SSH_KEY} chars"
            echo "Key header: $(echo "$SSH_KEY" | head -1)"
          fi
        env:
          SSH_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SERVER_PORT || '22' }}
          source: 'compose.prod.yml'
          target: ${{ secrets.PROD_DEPLOY_PATH }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-latest
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SERVER_PORT || '22' }}
          envs: GHCR_TOKEN,GHCR_USER,DOCKER_IMAGE
          script: |
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            echo ${GHCR_TOKEN} | docker login ghcr.io -u ${GHCR_USER} --password-stdin
            export DOCKER_IMAGE=${DOCKER_IMAGE}
            docker compose -f compose.prod.yml pull
            docker compose -f compose.prod.yml up -d --force-recreate
            docker image prune -f
            echo "✅ Deployed ${DOCKER_IMAGE} successfully"
