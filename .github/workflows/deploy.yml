name: Build & Deploy

on:
  push:
    branches:
      - dev
      - prod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Build & Push Docker Image
  # ─────────────────────────────────────────
  build:
    name: 🏗️ Build & Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment based on branch
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "prod" ]]; then
            echo "VITE_API_BASE_URL=${{ secrets.PROD_VITE_API_BASE_URL }}" >> $GITHUB_OUTPUT
            echo "VITE_MEDIA_BASE_URL=${{ secrets.PROD_VITE_MEDIA_BASE_URL }}" >> $GITHUB_OUTPUT
            echo "tag=prod-${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "VITE_API_BASE_URL=${{ secrets.DEV_VITE_API_BASE_URL }}" >> $GITHUB_OUTPUT
            echo "VITE_MEDIA_BASE_URL=${{ secrets.DEV_VITE_MEDIA_BASE_URL }}" >> $GITHUB_OUTPUT
            echo "tag=dev-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.env.outputs.tag }}
            type=raw,value=${{ github.ref_name }}-latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ steps.env.outputs.VITE_API_BASE_URL }}
            VITE_MEDIA_BASE_URL=${{ steps.env.outputs.VITE_MEDIA_BASE_URL }}
            VITE_USE_MOCKS=false

  # ─────────────────────────────────────────
  # Stage 2: Deploy to Server via SSH
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set deploy variables
        id: vars
        run: |
          if [[ "${{ github.ref_name }}" == "prod" ]]; then
            echo "host=${{ secrets.PROD_SERVER_HOST }}" >> $GITHUB_OUTPUT
            echo "user=${{ secrets.PROD_SERVER_USER }}" >> $GITHUB_OUTPUT
            echo "key<<EOF" >> $GITHUB_OUTPUT
            echo "${{ secrets.PROD_SSH_PRIVATE_KEY }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "port=${{ secrets.PROD_SERVER_PORT }}" >> $GITHUB_OUTPUT
            echo "deploy_path=${{ secrets.PROD_DEPLOY_PATH }}" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.ref_name }}-latest" >> $GITHUB_OUTPUT
          else
            echo "host=${{ secrets.DEV_SERVER_HOST }}" >> $GITHUB_OUTPUT
            echo "user=${{ secrets.DEV_SERVER_USER }}" >> $GITHUB_OUTPUT
            echo "key<<EOF" >> $GITHUB_OUTPUT
            echo "${{ secrets.DEV_SSH_PRIVATE_KEY }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "port=${{ secrets.DEV_SERVER_PORT }}" >> $GITHUB_OUTPUT
            echo "deploy_path=${{ secrets.DEV_DEPLOY_PATH }}" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.ref_name }}-latest" >> $GITHUB_OUTPUT
          fi

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.vars.outputs.host }}
          username: ${{ steps.vars.outputs.user }}
          key: ${{ steps.vars.outputs.key }}
          port: ${{ steps.vars.outputs.port || '22' }}
          source: "compose.prod.yml"
          target: ${{ steps.vars.outputs.deploy_path }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}
        with:
          host: ${{ steps.vars.outputs.host }}
          username: ${{ steps.vars.outputs.user }}
          key: ${{ steps.vars.outputs.key }}
          port: ${{ steps.vars.outputs.port || '22' }}
          envs: GHCR_TOKEN,GHCR_USER,DOCKER_IMAGE
          script: |
            cd ${{ steps.vars.outputs.deploy_path }}

            # Login to GHCR using the passed token
            echo ${GHCR_TOKEN} | docker login ghcr.io -u ${GHCR_USER} --password-stdin

            # Set image variable for compose
            export DOCKER_IMAGE=${DOCKER_IMAGE}

            # Pull latest image
            docker compose -f compose.prod.yml pull

            # Restart with new image
            docker compose -f compose.prod.yml up -d --force-recreate

            # Cleanup old images
            docker image prune -f

            echo "✅ Deployed ${DOCKER_IMAGE} successfully"

